name: Publish to NPM

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - 'docs/**'
      - 'reference-usages/**'
      - 'test-config.json'
      - '.claude/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for proper versioning
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Run tests
      run: npm test
      env:
        DEBUGGAI_API_KEY: 'test-api-key-for-testing'
        
    - name: Build project
      run: npm run build

    - name: Determine bump type from commit messages
      id: bump
      env:
        GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        GITHUB_SHA: ${{ github.sha }}
      run: |
        # Bead drn: detect feat!: / BREAKING CHANGE and bump major, not patch.
        BUMP_TYPE=$(node scripts/ci-bump-type.mjs)
        case "$BUMP_TYPE" in
          major|minor|patch) ;;
          *)
            echo "::error::ci-bump-type.mjs returned unexpected value: '$BUMP_TYPE'. Defaulting to patch."
            BUMP_TYPE=patch
            ;;
        esac
        echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
        echo "Determined bump type: $BUMP_TYPE (commits ${GITHUB_EVENT_BEFORE}..${GITHUB_SHA})"

    - name: Bump version (${{ steps.bump.outputs.bump_type }})
      env:
        BUMP_TYPE: ${{ steps.bump.outputs.bump_type }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        npm version "$BUMP_TYPE" --no-git-tag-version
        NEW_VERSION=$(node -p "require('./package.json').version")
        git add package.json package-lock.json
        git commit -m "chore: bump version to $NEW_VERSION ($BUMP_TYPE)"
        git push

    - name: Check if version already exists on NPM
      id: version_check
      run: |
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        
        if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
          echo "Version $PACKAGE_VERSION already exists on NPM"
          echo "should_publish=false" >> $GITHUB_OUTPUT
        else
          echo "Version $PACKAGE_VERSION does not exist on NPM, proceeding with publish"
          echo "should_publish=true" >> $GITHUB_OUTPUT
        fi
        
        echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
        echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
        
    - name: Publish to NPM
      if: steps.version_check.outputs.should_publish == 'true'
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        
    - name: Create GitHub Release
      if: steps.version_check.outputs.should_publish == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version_check.outputs.package_version }}
        name: Release v${{ steps.version_check.outputs.package_version }}
        body: |
          Release of ${{ steps.version_check.outputs.package_name }} version ${{ steps.version_check.outputs.package_version }}
          
          ## Changes
          See [CHANGELOG.md](https://github.com/debugg-ai/debugg-ai-mcp/blob/main/CHANGELOG.md) for details.
          
          ## Installation
          ```bash
          npx ${{ steps.version_check.outputs.package_name }}
          ```
        draft: false
        prerelease: false
        
    - name: Skip publish (version exists)
      if: steps.version_check.outputs.should_publish == 'false'
      run: |
        echo "::notice::Version ${{ steps.version_check.outputs.package_version }} already exists on NPM. Skipping publish."
        echo "To publish a new version, update the version in package.json and push again."